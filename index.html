<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Judit & Guillermo · Save the Date</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ══ MAPA ══ -->
  <div id="map-container">
    <div id="map-bg"></div>
    <div class="map-vignette"></div>

    <!-- SVG overlay: ruta punteada -->
    <svg class="svg-overlay" id="route-svg" viewBox="0 0 2000 857" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path id="flight-path" d="" fill="none" stroke="#c9973a"
            stroke-width="2" stroke-dasharray="8 5" opacity="0.9"
            filter="url(#glow)"/>
    </svg>

    <!-- Avión SVG -->
    <div id="plane-wrap" aria-hidden="true">
      <svg id="plane-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <!-- cuerpo -->
        <path d="M4 20 L34 8 L28 20 L34 32 Z" fill="#c9973a"/>
        <!-- ala derecha -->
        <path d="M16 20 L26 14 L26 20 Z" fill="#f0e0c0" opacity="0.8"/>
        <!-- ala izquierda -->
        <path d="M16 20 L26 26 L26 20 Z" fill="#f0e0c0" opacity="0.8"/>
      </svg>
    </div>

    <!-- Buenos Aires -->
    <div class="city-dot" id="dot-bue"></div>
    <div class="city-label" id="label-bue">Buenos Aires</div>

    <!-- Barcelona (pulsante) -->
    <div class="pulse-ring" id="ring1"></div>
    <div class="pulse-ring ring2" id="ring2"></div>
    <div class="city-dot bcn-dot" id="dot-bcn"
         onclick="openPopup()" role="button" tabindex="0"
         aria-label="Ver invitación de boda"></div>
    <div class="city-label" id="label-bcn">Barcelona</div>
    <div class="tap-hint" id="tap-hint">✦ toca aquí ✦</div>

    <!-- Textos: panel en la parte inferior central, fuera de la zona del mapa -->
    <div class="text-panel">
      <p class="text-std">Save the Date</p>
      <h1 class="text-names">Judit <span class="amp">&amp;</span> Guillermo</h1>
      <p class="text-date">17 · 07 · 2027</p>
    </div>

  </div>

  <!-- Canvas pétalos + partículas -->
  <canvas id="petal-canvas" aria-hidden="true"></canvas>

  <!-- ══ POPUP ══ -->
  <div class="popup-overlay" id="popup-overlay" onclick="closeOutside(event)">
    <div class="popup" id="popup" role="dialog" aria-modal="true">
      <button class="popup-close" onclick="closePopup()" aria-label="Cerrar">×</button>
      <div class="deco-l">❧</div>
      <div class="deco-r">❧</div>

      <div class="img-wrap">
        <img src="images/image1.png" alt="Judit y Guillermo" class="popup-img"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="img-placeholder"><span>Judit &amp; Guillermo</span></div>
      </div>

      <p class="popup-eyebrow">nos complace invitarte a nuestra boda</p>
      <h2 class="popup-title">Judit <span class="amp">&amp;</span> Guillermo</h2>
      <p class="popup-date">17 de julio de 2027</p>
      <div class="divider"></div>

      <div class="btn-row">
        <a href="https://forms.gle/mNn5QGhmMoPXfbsSA" target="_blank"
           rel="noopener" class="btn-primary">Confirmar asistencia</a>
        <button class="btn-secondary" onclick="closePopup()">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
