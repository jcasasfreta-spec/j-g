<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Judit & Guillermo — Save the Date</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      background: #08111f;
      font-family: Arial, sans-serif;
      color: white;
    }

    .background {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.08), transparent 40%),
        linear-gradient(180deg, #08111f 0%, #0b1730 100%);
      z-index: 0;
    }

    /* STARS */

    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: blink 3s infinite ease-in-out;
      opacity: 0.4;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.2;
      }

      50% {
        opacity: 1;
      }
    }

    /* MAIN */

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      padding: 30px 20px;
    }

    .title {
      text-align: center;
      margin-bottom: 40px;
    }

    .title h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: normal;
      margin-bottom: 10px;
    }

    .title p {
      letter-spacing: 4px;
      font-size: 0.8rem;
      opacity: 0.8;
      text-transform: uppercase;
    }

    /* MAP */

    .map-wrapper {
      position: relative;
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16 / 9;
    }

    .map-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.9;
    }

    /* ROUTE */

    .route-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .route-path {
      fill: none;
      stroke: #d4af37;
      stroke-width: 3;
      stroke-dasharray: 10 10;
    }

    /* CITIES */

    .city {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #d4af37;
      border-radius: 50%;
    }

    .city-label {
      position: absolute;
      font-size: 14px;
      white-space: nowrap;
      opacity: 0.8;
    }

    /* Buenos Aires */

    .ba {
      left: 23%;
      top: 67%;
    }

    .ba-label {
      left: 20%;
      top: 71%;
    }

    /* Barcelona */

    .bcn {
      left: 74%;
      top: 34%;
    }

    .bcn-label {
      left: 76%;
      top: 33%;
    }

    /* PLANE */

    .plane {
      position: absolute;
      width: 30px;
      height: 30px;

      left: 23%;
      top: 67%;

      animation: flyPlane 10s linear infinite;

      transform-origin: center;
    }

    @keyframes flyPlane {
      0% {
        left: 23%;
        top: 67%;
        transform: rotate(-18deg);
      }

      50% {
        transform: rotate(-8deg);
      }

      100% {
        left: 74%;
        top: 34%;
        transform: rotate(-18deg);
      }
    }

    /* PULSE BUTTON */

    .pulse-button {
      position: absolute;

      left: 74%;
      top: 34%;

      width: 26px;
      height: 26px;

      transform: translate(-50%, -50%);
      border-radius: 50%;

      background: #d4af37;

      cursor: pointer;
    }

    .pulse-button::before,
    .pulse-button::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(212, 175, 55, 0.7);
      animation: pulse 2s infinite;
    }

    .pulse-button::after {
      animation-delay: 1s;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      100% {
        transform: scale(3);
        opacity: 0;
      }
    }

    /* POPUP */

    .popup {
      position: fixed;
      inset: 0;

      background: rgba(0, 0, 0, 0.7);

      display: none;
      justify-content: center;
      align-items: center;

      z-index: 999;

      padding: 20px;
    }

    .popup.active {
      display: flex;
    }

    .popup-content {
      width: 100%;
      max-width: 850px;

      background: #101b31;

      display: flex;
      flex-direction: row;

      overflow: hidden;
    }

    .popup-image-container {
      width: 50%;
      background: black;
    }

    .popup-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: black;
    }

    .popup-text {
      width: 50%;

      display: flex;
      flex-direction: column;
      justify-content: center;

      padding: 40px;
    }

    .popup-text h2 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      font-weight: normal;
    }

    .popup-text p {
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      padding: 15px;
      text-decoration: none;
      text-align: center;
      transition: 0.2s;
    }

    .btn-primary {
      background: #d4af37;
      color: #08111f;
    }

    .btn-secondary {
      border: 1px solid white;
      color: white;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 25px;

      font-size: 30px;
      cursor: pointer;
    }

    /* MOBILE */

    @media (max-width: 768px) {

      .map-wrapper {
        aspect-ratio: 1 / 1;
      }

      .ba {
        left: 18%;
        top: 70%;
      }

      .ba-label {
        left: 10%;
        top: 76%;
        font-size: 12px;
      }

      .bcn {
        left: 78%;
        top: 32%;
      }

      .bcn-label {
        left: 60%;
        top: 25%;
        font-size: 12px;
      }

      .pulse-button {
        left: 78%;
        top: 32%;
      }

      @keyframes flyPlane {
        0% {
          left: 18%;
          top: 70%;
          transform: rotate(-18deg);
        }

        100% {
          left: 78%;
          top: 32%;
          transform: rotate(-18deg);
        }
      }

      .popup-content {
        flex-direction: column;
        max-width: 420px;
      }

      .popup-image-container {
        width: 100%;
        height: 300px;
      }

      .popup-text {
        width: 100%;
        padding: 30px;
      }

      .popup-text h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <div class="background"></div>

  <div class="stars" id="stars"></div>

  <div class="container">

    <div class="title">
      <h1>Judit & Guillermo</h1>
      <p>Save the Date</p>
    </div>

    <div class="map-wrapper">

      <!-- MAP IMAGE -->
      <img
        src="images/world.svg"
        alt="World Map"
        class="map-image"
      />

      <!-- ROUTE -->
      <svg class="route-svg" viewBox="0 0 1000 500">

        <path
          class="route-path"
          d="M230 335 Q520 130 740 170"
        />

      </svg>

      <!-- CITIES -->
      <div class="city ba"></div>
      <div class="city-label ba-label">Buenos Aires</div>

      <div class="city bcn"></div>
      <div class="city-label bcn-label">Barcelona</div>

      <!-- PLANE -->
      <img
        src="https://cdn-icons-png.flaticon.com/512/684/684908.png"
        class="plane"
      />

      <!-- BUTTON -->
      <div class="pulse-button" id="openPopup"></div>

    </div>

  </div>

  <!-- POPUP -->

  <div class="popup" id="popup">

    <div class="popup-content">

      <div class="close" id="closePopup">
        ×
      </div>

      <div class="popup-image-container">

        <img
          src="images/image1.png"
          class="popup-image"
        />

      </div>

      <div class="popup-text">

        <h2>¡Nos casamos!</h2>

        <p>
          Judit & Guillermo<br>
          17 / 07 / 2027
        </p>

        <div class="buttons">

          <a
            href="https://forms.gle/mNn5QGhmMoPXfbsSA"
            target="_blank"
            class="btn btn-primary"
          >
            Confirmar asistencia
          </a>

          <a
            href="#"
            class="btn btn-secondary"
            id="closeButton"
          >
            No podremos asistir
          </a>

        </div>

      </div>

    </div>

  </div>

  <script>

    // STARS

    const starsContainer = document.getElementById('stars');

    for (let i = 0; i < 80; i++) {

      const star = document.createElement('div');

      star.classList.add('star');

      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';

      star.style.animationDelay = Math.random() * 3 + 's';

      starsContainer.appendChild(star);
    }

    // POPUP

    const popup = document.getElementById('popup');

    document
      .getElementById('openPopup')
      .addEventListener('click', () => {
        popup.classList.add('active');
      });

    document
      .getElementById('closePopup')
      .addEventListener('click', () => {
        popup.classList.remove('active');
      });

    document
      .getElementById('closeButton')
      .addEventListener('click', (e) => {

        e.preventDefault();

        popup.classList.remove('active');
      });

    popup.addEventListener('click', (e) => {

      if (e.target === popup) {

        popup.classList.remove('active');
      }
    });

  </script>

</body>

</html>
