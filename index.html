<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Judit & Guillermo</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background:#08111f;
      color:white;

      font-family:Arial, sans-serif;

      overflow-x:hidden;
      min-height:100vh;
    }

    /* BACKGROUND */

    .background{

      position:fixed;
      inset:0;

      background:
      radial-gradient(circle at top,
      rgba(212,175,55,.08),
      transparent 35%),

      linear-gradient(
      180deg,
      #08111f 0%,
      #0d1730 100%
      );

      z-index:0;
    }

    /* STARS */

    .stars{

      position:fixed;
      inset:0;

      z-index:1;
      overflow:hidden;
    }

    .star{

      position:absolute;

      width:2px;
      height:2px;

      background:white;

      border-radius:50%;

      opacity:.3;

      animation:blink 3s infinite;
    }

    @keyframes blink{

      0%,100%{
        opacity:.2;
      }

      50%{
        opacity:1;
      }
    }

    /* MAIN */

    .container{

      position:relative;
      z-index:2;

      width:100%;
      min-height:100vh;

      display:flex;
      flex-direction:column;

      justify-content:center;
      align-items:center;

      padding:30px 20px;
    }

    .title{

      text-align:center;
      margin-bottom:35px;
    }

    .title h1{

      font-size:3rem;
      font-weight:normal;

      margin-bottom:10px;
    }

    .title p{

      font-size:.75rem;

      letter-spacing:4px;
      text-transform:uppercase;

      opacity:.8;
    }

    /* MAP */

    .map-wrapper{

      position:relative;

      width:100%;
      max-width:900px;
    }

    .map-crop{
    
      width:100%;
      overflow:hidden;
    
      position:relative;
    }
    
    .map{
    
      width:170%;
      max-width:none;
    
      transform:translateX(-22%);
    
      opacity:.18;
    
      display:block;
    }

    /* ROUTE */

    .route{

      position:absolute;
      inset:0;

      width:100%;
      height:100%;
    }

    .route path{

      fill:none;

      stroke:#d4af37;

      stroke-width:3;

      stroke-dasharray:10 10;
    }

    /* CITIES */

    .city{

      position:absolute;

      width:12px;
      height:12px;

      background:#d4af37;

      border-radius:50%;
    }

    .city-label{

      position:absolute;

      font-size:.8rem;

      white-space:nowrap;

      opacity:.85;
    }

    /* BUENOS AIRES */

    .ba{
      left:18%;
      top:68%;
    }

    .ba-label{
      left:10%;
      top:74%;
    }

    /* BARCELONA */

    .bcn{
      left:77%;
      top:33%;
    }

    .bcn-label{
      left:72%;
      top:25%;
    }

    /* PLANE */

    .plane{

      position:absolute;

      width:34px;

      left:18%;
      top:68%;

      animation:fly 9s linear infinite;
    }

    @keyframes fly{

      0%{

        left:18%;
        top:68%;

        transform:
        rotate(-18deg);
      }

      100%{

        left:77%;
        top:33%;

        transform:
        rotate(-18deg);
      }
    }

    /* BUTTON */

    .pulse{

      position:absolute;

      left:77%;
      top:33%;

      width:26px;
      height:26px;

      border-radius:50%;

      background:#d4af37;

      transform:translate(-50%,-50%);

      cursor:pointer;
    }

    .pulse::before,
    .pulse::after{

      content:"";

      position:absolute;
      inset:0;

      border-radius:50%;

      border:2px solid rgba(212,175,55,.7);

      animation:pulse 2s infinite;
    }

    .pulse::after{
      animation-delay:1s;
    }

    @keyframes pulse{

      0%{
        transform:scale(1);
        opacity:1;
      }

      100%{
        transform:scale(3);
        opacity:0;
      }
    }

    /* POPUP */

    .popup{

      position:fixed;
      inset:0;

      background:rgba(0,0,0,.72);

      display:none;

      justify-content:center;
      align-items:center;

      z-index:999;

      padding:20px;
    }

    .popup.active{
      display:flex;
    }

    .popup-content{

      width:100%;
      max-width:850px;

      background:#101a30;

      display:flex;

      overflow:hidden;
    }

    .popup-image{

      width:50%;
      object-fit:cover;
    }

    .popup-right{

      width:50%;

      padding:40px;

      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .popup-right h2{

      font-size:2.2rem;

      margin-bottom:20px;

      font-weight:normal;
    }

    .popup-right p{

      line-height:1.6;

      margin-bottom:30px;
    }

    .buttons{

      display:flex;
      flex-direction:column;

      gap:15px;
    }

    .btn{

      padding:15px;

      text-align:center;

      text-decoration:none;

      transition:.2s;
    }

    .btn-primary{

      background:#d4af37;
      color:#08111f;
    }

    .btn-secondary{

      border:1px solid white;
      color:white;
    }

    .btn:hover{
      opacity:.85;
    }

    .close{

      position:absolute;

      top:20px;
      right:25px;

      font-size:30px;

      cursor:pointer;
    }

    /* MOBILE */

    @media(max-width:768px){

      .title h1{
        font-size:2.5rem;
      }

      .popup-content{

        flex-direction:column;

        max-width:420px;
      }

      .popup-image{

        width:100%;
        height:320px;

        object-fit:cover;
      }

      .popup-right{

        width:100%;
        padding:30px;
      }
    }

  </style>

</head>

<body>

  <div class="background"></div>

  <div class="stars" id="stars"></div>

  <div class="container">

    <div class="title">

      <h1>Judit & Guillermo</h1>

      <p>Save the Date</p>

    </div>

    <div class="map-crop">
    
      <img
        src="images/world-atlantic.svg"
        class="map"
      />
    
    </div>

      <!-- ROUTE -->

      <svg
        class="route"
        viewBox="0 0 1000 500"
      >

        <path
          d="M180 350 Q500 90 760 170"
        />

      </svg>

      <!-- CITIES -->

      <div class="city ba"></div>
      <div class="city-label ba-label">
        Buenos Aires
      </div>

      <div class="city bcn"></div>
      <div class="city-label bcn-label">
        Barcelona
      </div>

      <!-- PLANE -->

      <img
        src="https://cdn-icons-png.flaticon.com/512/684/684908.png"
        class="plane"
      />

      <!-- BUTTON -->

      <div
        class="pulse"
        id="openPopup"
      ></div>

    </div>

  </div>

  <!-- POPUP -->

  <div
    class="popup"
    id="popup"
  >

    <div class="popup-content">

      <div
        class="close"
        id="closePopup"
      >
        ×
      </div>

      <img
        src="images/image1.png"
        class="popup-image"
      />

      <div class="popup-right">

        <h2>
          ¡Nos casamos!
        </h2>

        <p>

          Judit & Guillermo<br>
          17 / 07 / 2027

        </p>

        <div class="buttons">

          <a
            href="https://forms.gle/mNn5QGhmMoPXfbsSA"
            target="_blank"
            class="btn btn-primary"
          >
            Confirmar asistencia
          </a>

          <a
            href="#"
            class="btn btn-secondary"
            id="closeButton"
          >
            No podremos asistir
          </a>

        </div>

      </div>

    </div>

  </div>

  <script>

    // STARS

    const stars =
    document.getElementById('stars');

    for(let i=0;i<70;i++){

      const star =
      document.createElement('div');

      star.classList.add('star');

      star.style.left =
      Math.random()*100+'%';

      star.style.top =
      Math.random()*100+'%';

      star.style.animationDelay =
      Math.random()*3+'s';

      stars.appendChild(star);
    }

    // POPUP

    const popup =
    document.getElementById('popup');

    document
    .getElementById('openPopup')
    .onclick=()=>{

      popup.classList.add('active');
    };

    document
    .getElementById('closePopup')
    .onclick=()=>{

      popup.classList.remove('active');
    };

    document
    .getElementById('closeButton')
    .onclick=(e)=>{

      e.preventDefault();

      popup.classList.remove('active');
    };

    popup.onclick=(e)=>{

      if(e.target===popup){

        popup.classList.remove('active');
      }
    };

  </script>

</body>

</html>
